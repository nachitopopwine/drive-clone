services:
  minio:
    image: minio/minio:latest
    container_name: minio-s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /minio_data --console-address ":9001"
    volumes:
      - ./docker/minio-init.sh:/docker-entrypoint-initaws.d/init-minio.sh
    networks:
      - drive-network
    healthcheck:
    test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/files').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
    interval: 10s
    timeout: 5s
    retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drive-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    networks:
      - drive-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/files"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drive-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    networks:
      - drive-network

networks:
  drive-network:
    driver: bridge
