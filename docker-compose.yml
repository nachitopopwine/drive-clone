services:
  localstack:
    image: localstack/localstack:3.0
    container_name: localstack-s3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./docker/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    networks:
      - drive-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drive-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_ENDPOINT: http://localstack:4566
    depends_on:
      - localstack
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    networks:
      - drive-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drive-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    networks:
      - drive-network

networks:
  drive-network:
    driver: bridge